<p-toast position="top-center"></p-toast>

<div class="login-shell">
  <a class="back" routerLink="/">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    <span>Volver al sitio</span>
  </a>

  <!-- ===== Panel de marca ===== -->
  <aside class="brand-panel">
    <div class="watermark display" aria-hidden="true">PADEL</div>
    <div class="bp-inner">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="-6 -3 44 46" fill="none">
            <path transform="rotate(-28 16 20.3)" fill="currentColor" fill-rule="evenodd" d="M16 2.5C22.9 2.5 28 7.4 28 14C28 19.9 24.2 23.3 19.6 24.3C18.9 24.5 18.5 25.1 18.5 25.9L19 34.3C19.1 36.6 17.7 38.2 16 38.2C14.3 38.2 12.9 36.6 13 34.3L13.5 25.9C13.5 25.1 13.1 24.5 12.4 24.3C7.8 23.3 4 19.9 4 14C4 7.4 9.1 2.5 16 2.5ZM10.9 9a1.3 1.3 0 1 0 2.6 0a1.3 1.3 0 1 0-2.6 0ZM14.7 9a1.3 1.3 0 1 0 2.6 0a1.3 1.3 0 1 0-2.6 0ZM18.5 9a1.3 1.3 0 1 0 2.6 0a1.3 1.3 0 1 0-2.6 0ZM10.9 13.4a1.3 1.3 0 1 0 2.6 0a1.3 1.3 0 1 0-2.6 0ZM14.7 13.4a1.3 1.3 0 1 0 2.6 0a1.3 1.3 0 1 0-2.6 0ZM18.5 13.4a1.3 1.3 0 1 0 2.6 0a1.3 1.3 0 1 0-2.6 0ZM10.9 17.8a1.3 1.3 0 1 0 2.6 0a1.3 1.3 0 1 0-2.6 0ZM14.7 17.8a1.3 1.3 0 1 0 2.6 0a1.3 1.3 0 1 0-2.6 0ZM18.5 17.8a1.3 1.3 0 1 0 2.6 0a1.3 1.3 0 1 0-2.6 0Z"/>
          </svg>
        </span>
        <div class="logo-type">
          <div class="name display">Padel-<span class="hub">HUB</span></div>
          <div class="sub eyebrow">Gestión de turnos</div>
        </div>
      </div>
      <p class="bp-title display">La agenda de tu club,<br />en un solo lugar.</p>
    </div>
    <p class="bp-foot mono">Hecho para clubes de pádel · Córdoba, AR</p>
  </aside>

  <!-- ===== Formulario ===== -->
  <main class="form-panel">
    <section class="login-card">
      <div class="block-h"><span class="t display">Ingresar</span><span class="ln"></span></div>
      <p class="block-sub">Accedé al panel de gestión de tu club.</p>

      <form (ngSubmit)="submit()">
        <div class="field">
          <label for="email">Email</label>
          <input pInputText id="email" type="email" name="email" autocomplete="username"
            placeholder="tu@email.com" [ngModel]="email()" (ngModelChange)="email.set($event)" />
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <p-password inputId="password" name="password" [feedback]="false" [toggleMask]="true"
            [fluid]="true" autocomplete="current-password" placeholder="••••••••"
            [ngModel]="password()" (ngModelChange)="password.set($event)"></p-password>
        </div>

        <button type="submit" class="confirm" [disabled]="loading() || !email().trim() || !password()">
          {{ loading() ? 'Entrando…' : 'Entrar' }}
        </button>
      </form>

      @if (isDev) {
        <p class="dev-hint mono"><span class="dh-tag">Dev</span> Usá las credenciales sembradas del back.</p>
      }
    </section>
  </main>
</div>
